apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    app: {{ .Values.gateway.name }}
    component: gateway
    project: {{ .Values.projectCode }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.gateway.name }}
      component: gateway
  template:
    metadata:
      labels:
        app: {{ .Values.gateway.name }}
        component: gateway
        project: {{ .Values.projectCode }}
    spec:
      containers:
        - name: gateway-container
          image: "{{ .Values.images.gateway.repository }}:{{ .Values.images.gateway.tag }}"
          imagePullPolicy: {{ .Values.images.gateway.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    app: {{ .Values.gateway.name }}
    component: gateway
    project: {{ .Values.projectCode }}
spec:
  type: NodePort
  selector:
    app: {{ .Values.gateway.name }}
    component: gateway
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: http
      nodePort: 30080
