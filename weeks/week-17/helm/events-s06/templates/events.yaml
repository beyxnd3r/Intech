apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.events.name }}
  labels:
    app: {{ .Values.events.app }}
    component: events
    project: {{ .Values.projectCode }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.events.app }}
      component: events
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: {{ .Values.events.app }}
        component: events
        project: {{ .Values.projectCode }}
    spec:
      containers:
        - name: {{ .Values.events.container }}
          image: "{{ .Values.images.events.repository }}:{{ .Values.images.events.tag }}"
          imagePullPolicy: {{ .Values.images.events.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.events.port }}
          readinessProbe:
            httpGet:
              path: /api/events
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/events
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.events.name }}
  labels:
    app: {{ .Values.events.app }}
    component: events
    project: {{ .Values.projectCode }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.events.app }}
    component: events
  ports:
    - name: http
      port: {{ .Values.events.port }}
      targetPort: http
