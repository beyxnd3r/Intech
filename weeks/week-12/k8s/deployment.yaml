apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comments-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: comments-container
        image: comments-s06
        ports:
        - containerPort: 8278
        readinessProbe:
          httpGet:
            path: /health
            port: 8278
            initialDelaySeconds: 5
            periodSeconds: 5
        livenessProbe:
          httpGet:
          path: /health
          port: 8278
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"   
            cpu: "500m"