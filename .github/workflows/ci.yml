name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: devices-s06
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8

      
      - name: Run linter
        run: |
          flake8 app || true

      - name: Run tests
        run: |
          pytest

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME -f weeks/week-10/Dockerfile weeks/week-10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devices-s06-artifact
          path: .